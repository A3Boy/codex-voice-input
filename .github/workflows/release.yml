name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x
      - name: Test hotkey parsing
        shell: pwsh
        run: dotnet run --project .\tests\HotkeyContract\HotkeyContract.csproj
      - name: Run source contracts
        shell: pwsh
        run: Get-ChildItem .\scripts\test-*-contract.ps1 | ForEach-Object { & $_.FullName }
      - name: Build portable package
        shell: pwsh
        run: .\package.ps1 -SkipDesktopShortcut -SkipLaunch -SkipVerification
      - name: Create checksums
        shell: pwsh
        run: |
          $asset = ".\dist\CodexVoiceInput-win-x64.zip"
          $hash = (Get-FileHash -Algorithm SHA256 $asset).Hash.ToLowerInvariant()
          "$hash  CodexVoiceInput-win-x64.zip" | Set-Content -Encoding ascii .\dist\SHA256SUMS.txt
          Copy-Item .\install.ps1 .\dist\install.ps1
      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" `
            .\dist\CodexVoiceInput-win-x64.zip `
            .\dist\SHA256SUMS.txt `
            .\dist\install.ps1 `
            --title "Codex Voice Input ${{ github.ref_name }}" `
            --generate-notes
