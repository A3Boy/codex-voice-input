name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x
      - name: Test hotkey parsing
        shell: pwsh
        run: dotnet run --project .\tests\HotkeyContract\HotkeyContract.csproj
      - name: Test text post-processing
        shell: pwsh
        run: dotnet run --project .\tests\TextPostProcessorContract\TextPostProcessorContract.csproj
      - name: Test clipboard round trip
        shell: pwsh
        run: dotnet run --project .\tests\ClipboardContract\ClipboardContract.csproj
      - name: Run source contracts
        shell: pwsh
        run: Get-ChildItem .\scripts\test-*-contract.ps1 | ForEach-Object { & $_.FullName }
      - name: Build portable package
        shell: pwsh
        run: .\package.ps1 -SkipDesktopShortcut -SkipLaunch -SkipVerification
      - name: Build one-click installer
        shell: pwsh
        run: |
          choco install innosetup --yes --no-progress
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" .\installer\CodexVoiceInput.iss
      - name: Create checksums
        shell: pwsh
        run: |
          $assets = @(
            ".\dist\CodexVoiceInput-Setup.exe",
            ".\dist\CodexVoiceInput-win-x64.zip"
          )
          $lines = foreach ($asset in $assets) {
            $hash = (Get-FileHash -Algorithm SHA256 $asset).Hash.ToLowerInvariant()
            "$hash  $([IO.Path]::GetFileName($asset))"
          }
          $lines | Set-Content -Encoding ascii .\dist\SHA256SUMS.txt
          Copy-Item .\install.ps1 .\dist\install.ps1
      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" `
            .\dist\CodexVoiceInput-Setup.exe `
            .\dist\CodexVoiceInput-win-x64.zip `
            .\dist\SHA256SUMS.txt `
            .\dist\install.ps1 `
            --title "Codex Voice Input ${{ github.ref_name }}" `
            --generate-notes
