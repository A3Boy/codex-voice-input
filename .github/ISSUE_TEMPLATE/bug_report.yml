name: Bug report
description: Report a reproducible Codex Voice Input problem
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "Do not upload auth.json, access tokens, private audio, recognition history, or unredacted logs."
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: v0.1.2
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows version
      placeholder: Windows 11 24H2 x64
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
